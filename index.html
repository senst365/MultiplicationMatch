<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>乘法消消樂</title>
    <!-- 改為引入台灣常見標準字體 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fff0f5; 
            --board-bg: #ffffff;
            --grid-width: 8;
            /* 修改計算方式，扣除上方 UI 高度 (220px)，確保絕對不被裁切 */
            --board-size: min(92vw, calc(100vh - 220px), 550px); 
            --gap: clamp(2px, 1.5vmin, 8px);
            --cell-font-scale: 0.26; /* 進一步縮小字體比例，確保對應圓形安全框 */
            --cell-font-max: 24px;
        }

        body.zoom-mode {
            /* 放大模式下，也要確保加上 UI 高度後不超過螢幕 */
            --board-size: min(96vw, calc(100vh - 180px), 800px); 
            --cell-font-scale: 0.32; /* 調整放大比例 */
            --cell-font-max: 42px;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation; 
        }

        body {
            /* 使用標準黑體字，確保數字寫法是台灣學生最習慣的樣式 */
            font-family: 'Noto Sans TC', '微軟正黑體', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            overflow-y: auto; /* 解除鎖定，允許滾動，防止小螢幕或特殊比例被裁切 */
            overflow-x: hidden;
        }

        h1 {
            color: #ff6b81;
            margin: 0 0 5px 0;
            font-size: clamp(1.5rem, 5vmin, 2.2rem);
            text-shadow: 2px 2px 0px #fff, 4px 4px 0px #ffc0cb; 
            font-weight: 700;
            letter-spacing: 2px;
            text-align: center;
        }

        .subtitle {
            font-size: clamp(0.8rem, 2.5vmin, 1rem);
            color: #747d8c;
            margin-bottom: 10px;
            background: rgba(255,255,255,0.8);
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            text-align: center;
        }

        .stats-container {
            display: flex;
            flex-wrap: wrap; /* 允許在手機上自動換行 */
            justify-content: center;
            gap: clamp(8px, 2vw, 15px);
            align-items: center;
            margin-bottom: 15px;
            background: white;
            padding: 8px 20px;
            border-radius: 25px;
            box-shadow: 0 6px 0px rgba(255, 107, 129, 0.2);
            border: 4px solid #ff6b81;
            max-width: 100%;
        }

        .stat-box {
            text-align: center;
            min-width: 50px;
            margin: 0 5px;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #a4b0be;
            font-weight: bold;
        }

        .stat-value {
            font-size: 1.4rem;
            font-weight: bold;
            color: #2f3542;
        }

        #timer { color: #ff4757; }

        .btn-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .action-button {
            color: white;
            border: none;
            padding: 8px 12px;
            font-size: clamp(0.85rem, 2vmin, 0.95rem);
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s, filter 0.2s;
            font-family: inherit;
        }

        .action-button:active {
            transform: translateY(4px);
        }

        .hint-btn { background-color: #ffa502; box-shadow: 0 4px 0 #e67e22; }
        .hint-btn:active { box-shadow: 0 0 0 #e67e22; }
        
        .restart-btn { background-color: #2ed573; box-shadow: 0 4px 0 #20bf6b; }
        .restart-btn:active { box-shadow: 0 0 0 #20bf6b; }

        .menu-btn { background-color: #1e90ff; box-shadow: 0 4px 0 #005ce6; }
        .menu-btn:active { box-shadow: 0 0 0 #005ce6; }

        .zoom-btn { background-color: #9b59b6; box-shadow: 0 4px 0 #8e44ad; }
        .zoom-btn:active { box-shadow: 0 0 0 #8e44ad; }

        .game-container {
            width: var(--board-size);
            height: var(--board-size);
            background-color: var(--board-bg);
            padding: clamp(4px, 1.5vmin, 12px);
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1), inset 0 0 0 6px #7bed9f;
            position: relative;
        }

        .grid {
            display: grid;
            width: 100%;
            height: 100%;
            grid-template-columns: repeat(var(--grid-width), 1fr);
            grid-template-rows: repeat(var(--grid-width), 1fr);
            gap: var(--gap);
        }

        .cell {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(10px, calc(var(--board-size) / var(--grid-width) * var(--cell-font-scale)), var(--cell-font-max));
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: transform 0.2s, filter 0.2s;
            position: relative;
            text-shadow: 1px 2px 0 rgba(0,0,0,0.3);
            /* 移除 overflow: hidden 避免文字邊緣被圓形切斷 */
            white-space: nowrap;
            letter-spacing: -0.5px; /* 稍微縮小字距，讓算式更集中 */
        }

        .cell:active { transform: scale(0.85); }
        .cell.selected { border: 3px solid #fff; transform: scale(1.15); z-index: 10; box-shadow: 0 0 15px rgba(255,255,255,0.8); }
        .cell.hint-target { animation: hint-glow 0.8s infinite alternate; z-index: 15; border: 3px dashed #fff; }
        .cell.match-highlight { animation: blink-pulse 0.8s ease-in-out forwards; z-index: 20; border: 3px solid #fff; box-shadow: 0 0 20px #ffeaa7; }
        .cell.matched { animation: pop 0.4s ease-out forwards; }

        @keyframes hint-glow { from { filter: brightness(1); transform: scale(1); } to { filter: brightness(1.3); transform: scale(1.1); box-shadow: 0 0 15px #f1c40f;} }
        @keyframes blink-pulse { 0% { transform: scale(1); filter: brightness(1); } 50% { transform: scale(1.25); filter: brightness(1.4); } 100% { transform: scale(1); filter: brightness(1); } }
        @keyframes pop { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.4) rotate(15deg); opacity: 0.8; } 100% { transform: scale(0); opacity: 0; } }

        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(47, 53, 66, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 30px;
            text-align: center;
            width: 90%;
            max-width: 380px;
            max-height: 95vh; /* 避免手機直向時超出螢幕 */
            overflow-y: auto;
            animation: bounceIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 8px solid #70a1ff;
            box-shadow: 0 15px 0px rgba(0,0,0,0.2);
        }

        /* 自訂捲軸 */
        .modal-content::-webkit-scrollbar { width: 8px; }
        .modal-content::-webkit-scrollbar-thumb { background: #70a1ff; border-radius: 10px; }

        h2 { color: #ff4757; margin-bottom: 5px; font-size: 1.6rem; text-shadow: 1px 1px 0 #fff; }
        
        .settings-group {
            background: #f1f2f6;
            padding: 12px;
            border-radius: 15px;
            margin: 10px 0;
            text-align: left;
            border: 2px dashed #ced6e0;
        }

        .settings-title { color: #7f8c8d; font-size: 0.85rem; margin-bottom: 5px; font-weight: bold; }
        
        .radio-label {
            display: block;
            margin: 6px 0;
            cursor: pointer;
            font-size: 0.95rem;
            color: #2f3542;
            font-weight: bold;
        }

        .settings-group select {
            width: 100%; padding: 8px; font-size: 0.95rem; border-radius: 10px; 
            border: 2px solid #bdc3c7; color: #2c3e50; font-weight: bold; cursor: pointer;
            font-family: 'Noto Sans TC', '微軟正黑體', sans-serif;
        }

        .instruction-box { background: #fff5f6; padding: 10px; border-radius: 15px; margin: 10px 0; font-size: 0.9rem; color: #57606f; text-align: left; border: 2px solid #ffeaa7; }
        
        .difficulty-buttons { display: flex; gap: 8px; justify-content: center; margin-top: 15px; }
        .difficulty-buttons button { flex: 1; padding: 12px 2px; font-size: 0.9rem; color: white; border: none; font-weight: bold; border-radius: 20px; cursor: pointer; font-family: inherit; transition: transform 0.1s; }
        .difficulty-buttons button:active { transform: translateY(4px); box-shadow: 0 0 0 transparent !important; }

        @keyframes bounceIn { 0% { transform: scale(0.3); opacity: 0; } 50% { transform: scale(1.05); opacity: 1; } 70% { transform: scale(0.9); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <h1>✖️ 乘法消消樂</h1>
    <div class="subtitle">連起相等的算式與數字！</div>

    <div class="stats-container">
        <div class="stat-box">
            <div class="stat-label">得分</div>
            <div class="stat-value" id="score">0</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">時間</div>
            <div class="stat-value" id="timer">120</div>
        </div>
        <div class="btn-group">
            <button id="hint-btn" class="action-button hint-btn" onclick="showHint()">💡 提示</button>
            <button id="zoom-btn" class="action-button zoom-btn" onclick="toggleZoom()">🔍 放大</button>
            <button id="restart-btn" class="action-button restart-btn" onclick="restartGame()">🔄 重玩</button>
            <button id="menu-btn" class="action-button menu-btn" onclick="returnToMenu()">🏠 選單</button>
        </div>
    </div>

    <div class="game-container">
        <div class="grid" id="grid"></div>
    </div>

    <div class="modal" id="modal" style="display: flex;">
        <div class="modal-content">
            <h2 id="modal-title">準備好了嗎？</h2>
            
            <div class="settings-group">
                <div class="settings-title">① 視覺風格：</div>
                <label class="radio-label"><input type="radio" name="colorTheme" value="color" checked> 🌈 彩色版 (活潑可愛)</label>
                <label class="radio-label"><input type="radio" name="colorTheme" value="bw"> ⚫⚪ 純色版 (專注數字)</label>
            </div>

            <div class="settings-group">
                <div class="settings-title">② 遊玩規則：</div>
                <label class="radio-label"><input type="radio" name="playMode" value="swap" checked> 🔄 傳統互換 (享連鎖快感)</label>
                <label class="radio-label"><input type="radio" name="playMode" value="click"> 👆 點擊相鄰 (節奏明快)</label>
            </div>

            <div class="settings-group">
                <div class="settings-title">③ 遊戲時間：</div>
                <select id="time-select">
                    <option value="0">不計時 (悠閒練習)</option>
                    <option value="60">60 秒 (極速)</option>
                    <option value="120" selected>120 秒 (標準)</option>
                    <option value="180">180 秒 (加長)</option>
                    <option value="300">300 秒 (悠閒)</option>
                </select>
            </div>

            <div class="instruction-box">
                <p id="instruction-text"><b>互換</b>相鄰的球，將 <b>2 個</b> 或以上答案相等的連成線，會引發掉落連鎖！</p>
                <p style="color:#e74c3c; font-size:0.8rem; margin:0;">※ 每次開局題目都會更新！提示扣10分。</p>
            </div>

            <p id="modal-score-display" style="font-weight:bold; color: #e67e22; margin: 5px 0;"></p>
            
            <div class="settings-title" style="text-align:left; padding-left:5px;">④ 選擇難度並開始：</div>
            <div class="difficulty-buttons" id="start-buttons">
                <button onclick="startGame(4)" style="background: #1abc9c; box-shadow: 0 4px 0 #16a085;">極簡 (4x4)</button>
                <button onclick="startGame(5)" style="background: #3498db; box-shadow: 0 4px 0 #2980b9;">簡單 (5x5)</button>
                <button onclick="startGame(8)" style="background: #e74c3c; box-shadow: 0 4px 0 #c0392b;">挑戰 (8x8)</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('grid');
            const scoreDisplay = document.getElementById('score');
            const timerDisplay = document.getElementById('timer');
            const modal = document.getElementById('modal');
            const modalTitle = document.getElementById('modal-title');
            const modalScoreDisplay = document.getElementById('modal-score-display');
            const modeRadios = document.querySelectorAll('input[name="playMode"]');
            const instructionText = document.getElementById('instruction-text');
            
            let width = 8; 
            const squares = [];
            let score = 0;
            let timeLeft = 120;
            let timerId;
            let gameActive = false;
            let isProcessing = false;
            let currentMode = 'swap'; 
            let currentTheme = 'color';
            let activeFamilies = []; 

            // 擴充到 21 組乘法題庫，保證每次遊戲都充滿新鮮感！
            const allMultiplicationFamilies = [
                { id: 'p12', value: 12, labels: ['3×4', '4×3', '2×6', '6×2', '12'] },
                { id: 'p14', value: 14, labels: ['2×7', '7×2', '14'] },
                { id: 'p15', value: 15, labels: ['3×5', '5×3', '15'] },
                { id: 'p16', value: 16, labels: ['4×4', '2×8', '8×2', '16'] },
                { id: 'p18', value: 18, labels: ['3×6', '6×3', '2×9', '9×2', '18'] },
                { id: 'p20', value: 20, labels: ['4×5', '5×4', '2×10', '20'] },
                { id: 'p21', value: 21, labels: ['3×7', '7×3', '21'] },
                { id: 'p24', value: 24, labels: ['4×6', '6×4', '3×8', '8×3', '24'] },
                { id: 'p27', value: 27, labels: ['3×9', '9×3', '27'] },
                { id: 'p28', value: 28, labels: ['4×7', '7×4', '28'] },
                { id: 'p30', value: 30, labels: ['5×6', '6×5', '30'] },
                { id: 'p32', value: 32, labels: ['4×8', '8×4', '32'] },
                { id: 'p35', value: 35, labels: ['5×7', '7×5', '35'] },
                { id: 'p36', value: 36, labels: ['4×9', '9×4', '6×6', '36'] },
                { id: 'p40', value: 40, labels: ['5×8', '8×5', '40'] },
                { id: 'p42', value: 42, labels: ['6×7', '7×6', '42'] },
                { id: 'p45', value: 45, labels: ['5×9', '9×5', '45'] },
                { id: 'p48', value: 48, labels: ['6×8', '8×6', '48'] },
                { id: 'p54', value: 54, labels: ['6×9', '9×6', '54'] },
                { id: 'p56', value: 56, labels: ['7×8', '8×7', '56'] },
                { id: 'p63', value: 63, labels: ['7×9', '9×7', '63'] }
            ];

            // 彩色調色盤設定
            const colorPalette = ['#e67e22', '#e74c3c', '#8e44ad', '#2980b9', '#16a085', '#27ae60', '#d35400', '#f368e0'];
            
            // 單色版統一使用這個深灰色
            const singleColor = '#2f3542'; 

            let selectedSquareId = null;

            modeRadios.forEach(radio => {
                radio.addEventListener('change', (e) => {
                    if(e.target.value === 'swap') {
                        instructionText.innerHTML = '<b>互換</b>相鄰的球，將 <b>2 個</b> 或以上答案相等的連成線，會引發掉落連鎖！';
                    } else {
                        instructionText.innerHTML = '<b>點擊</b>相鄰且答案相同的球（至少2顆），即可直接整塊消除！';
                    }
                });
            });

            function getRandomItem() {
                const family = activeFamilies[Math.floor(Math.random() * activeFamilies.length)];
                const label = family.labels[Math.floor(Math.random() * family.labels.length)];
                return { familyId: family.id, label: label };
            }

            function createBoard() {
                grid.innerHTML = '';
                squares.length = 0;
                const totalCells = width * width;

                for (let i = 0; i < totalCells; i++) {
                    const square = document.createElement('div');
                    square.setAttribute('id', i);
                    square.classList.add('cell');
                    
                    let randomIdx = Math.floor(Math.random() * activeFamilies.length);
                    let currentFamily = activeFamilies[randomIdx];
                    
                    if (currentMode === 'swap') {
                        let leftFamilyId = (i % width !== 0) ? squares[i - 1].getAttribute('data-family') : null;
                        let topFamilyId = (i >= width) ? squares[i - width].getAttribute('data-family') : null;

                        while (currentFamily.id === leftFamilyId || currentFamily.id === topFamilyId) {
                            randomIdx = Math.floor(Math.random() * activeFamilies.length);
                            currentFamily = activeFamilies[randomIdx];
                        }
                    }

                    const label = currentFamily.labels[Math.floor(Math.random() * currentFamily.labels.length)];
                    applyItemData(square, { familyId: currentFamily.id, label: label });

                    grid.appendChild(square);
                    squares.push(square);

                    square.addEventListener('click', () => clickSquare(i));
                }

                if (currentMode === 'swap') {
                    if (!findPossibleSwapMove()) createBoard();
                } else {
                    if (!findPossibleClickMove()) createBoard();
                }
                
                isProcessing = false;
            }

            function applyItemData(element, data) {
                // 如果是彩色版隨機挑選顏色，如果是黑白版統一使用深灰色
                const bgColor = currentTheme === 'bw' ? singleColor : colorPalette[Math.floor(Math.random() * colorPalette.length)];
                
                element.style.backgroundColor = bgColor; 
                element.innerText = data.label;
                element.setAttribute('data-family', data.familyId);
                element.style.color = 'white';
                
                if(data.familyId) {
                    element.style.boxShadow = 'inset -3px -5px 10px rgba(0,0,0,0.25), inset 2px 3px 5px rgba(255,255,255,0.2)';
                } else {
                    element.style.boxShadow = 'none';
                    element.style.backgroundColor = 'transparent'; 
                }
            }

            function clickSquare(id) {
                if (!gameActive || isProcessing) return;
                squares.forEach(sq => sq.classList.remove('hint-target'));

                if (currentMode === 'swap') {
                    const square = squares[id];

                    if (selectedSquareId === null) {
                        selectedSquareId = id;
                        square.classList.add('selected');
                    } else if (selectedSquareId === id) {
                        square.classList.remove('selected');
                        selectedSquareId = null;
                    } else {
                        squares[selectedSquareId].classList.remove('selected');
                        let currentId = id;
                        let prevId = selectedSquareId;
                        selectedSquareId = null;
                        
                        if (isValidSwapMove(prevId, currentId)) {
                            swapSquares(prevId, currentId);
                        } else {
                            selectedSquareId = id;
                            squares[id].classList.add('selected');
                        }
                    }
                } else {
                    const targetFamily = squares[id].getAttribute('data-family');
                    if (!targetFamily) return;

                    const cluster = getConnectedCluster(id, targetFamily);

                    if (cluster.length >= 2) {
                        isProcessing = true;
                        cluster.forEach(index => squares[index].classList.add('match-highlight'));

                        setTimeout(() => {
                            score += cluster.length * 10;
                            scoreDisplay.innerText = score;

                            cluster.forEach(index => {
                                squares[index].classList.remove('match-highlight'); 
                                squares[index].classList.add('matched'); 
                            });

                            setTimeout(() => {
                                cluster.forEach(index => {
                                    squares[index].classList.remove('matched');
                                    squares[index].removeAttribute('data-family'); 
                                    squares[index].innerText = '';
                                    squares[index].style.backgroundColor = 'transparent'; 
                                    squares[index].style.boxShadow = 'none';
                                });
                                moveDown();
                            }, 400); 
                        }, 400); 
                    }
                }
            }

            function getNeighbors(index) {
                const neighbors = [];
                const r = Math.floor(index / width);
                const c = index % width;

                if (r > 0) neighbors.push(index - width); 
                if (r < width - 1) neighbors.push(index + width); 
                if (c > 0) neighbors.push(index - 1); 
                if (c < width - 1) neighbors.push(index + 1); 
                return neighbors;
            }

            function getConnectedCluster(startIndex, familyId) {
                const visited = new Set();
                const cluster = [];
                const queue = [startIndex];

                while (queue.length > 0) {
                    const current = queue.shift();
                    if (visited.has(current)) continue;

                    visited.add(current);
                    cluster.push(current);

                    const neighbors = getNeighbors(current);
                    for (let n of neighbors) {
                        if (!visited.has(n) && squares[n].getAttribute('data-family') === familyId) {
                            queue.push(n);
                        }
                    }
                }
                return cluster;
            }

            function findPossibleClickMove() {
                const totalCells = width * width;
                const possibleMoves = [];
                for (let i = 0; i < totalCells; i++) {
                    const family = squares[i].getAttribute('data-family');
                    if (family) {
                        const neighbors = getNeighbors(i);
                        for (let n of neighbors) {
                            if (squares[n].getAttribute('data-family') === family) {
                                possibleMoves.push([i, n]);
                            }
                        }
                    }
                }
                // 收集所有可走步數後隨機回傳一組，避免提示永遠集中在第一排
                if (possibleMoves.length > 0) {
                    return possibleMoves[Math.floor(Math.random() * possibleMoves.length)];
                }
                return null;
            }

            function isValidSwapMove(id1, id2) {
                return getNeighbors(id1).includes(id2);
            }

            function swapSquares(id1, id2) {
                const family1 = squares[id1].getAttribute('data-family');
                const text1 = squares[id1].innerText;
                const color1 = squares[id1].style.backgroundColor;

                const family2 = squares[id2].getAttribute('data-family');
                const text2 = squares[id2].innerText;
                const color2 = squares[id2].style.backgroundColor;

                setSquareVisuals(squares[id1], family2, text2, color2);
                setSquareVisuals(squares[id2], family1, text1, color1);

                if (!checkMatches()) {
                    setTimeout(() => {
                        setSquareVisuals(squares[id1], family1, text1, color1);
                        setSquareVisuals(squares[id2], family2, text2, color2);
                    }, 200);
                } else {
                    setTimeout(() => resolveMatches(true), 100);
                }
            }

            function checkMatches() {
                const totalCells = width * width;
                for (let i = 0; i < totalCells; i++) {
                    if (i % width < width - 1) {
                        let rowOfTwo = [i, i + 1];
                        let decidedFamily = squares[i].getAttribute('data-family');
                        if (rowOfTwo.every(index => squares[index].getAttribute('data-family') === decidedFamily && decidedFamily)) return true;
                    }
                }
                for (let i = 0; i < totalCells - width; i++) {
                    let columnOfTwo = [i, i + width];
                    let decidedFamily = squares[i].getAttribute('data-family');
                    if (columnOfTwo.every(index => squares[index].getAttribute('data-family') === decidedFamily && decidedFamily)) return true;
                }
                return false;
            }

            function simulateSwap(id1, id2) {
                let fam1 = squares[id1].getAttribute('data-family');
                let fam2 = squares[id2].getAttribute('data-family');
                squares[id1].setAttribute('data-family', fam2);
                squares[id2].setAttribute('data-family', fam1);
                let isMatch = checkMatches();
                squares[id1].setAttribute('data-family', fam1);
                squares[id2].setAttribute('data-family', fam2);
                return isMatch;
            }

            function findPossibleSwapMove() {
                const totalCells = width * width;
                const possibleMoves = [];
                for (let i = 0; i < totalCells; i++) {
                    if (i % width < width - 1) {
                        if (simulateSwap(i, i + 1)) possibleMoves.push([i, i + 1]);
                    }
                    if (i < totalCells - width) {
                        if (simulateSwap(i, i + width)) possibleMoves.push([i, i + width]);
                    }
                }
                // 收集所有可走步數後隨機回傳一組，避免提示永遠集中在第一排
                if (possibleMoves.length > 0) {
                    return possibleMoves[Math.floor(Math.random() * possibleMoves.length)];
                }
                return null;
            }

            function resolveMatches(addPoints) {
                let matchedIndices = new Set();
                const totalCells = width * width;

                for (let i = 0; i < totalCells; i++) {
                    if (i % width < width - 1) {
                        let rowOfTwo = [i, i + 1];
                        let decidedFamily = squares[i].getAttribute('data-family');
                        if (rowOfTwo.every(index => squares[index].getAttribute('data-family') === decidedFamily && decidedFamily)) {
                            rowOfTwo.forEach(index => matchedIndices.add(index));
                        }
                    }
                }
                for (let i = 0; i < totalCells - width; i++) {
                    let columnOfTwo = [i, i + width];
                    let decidedFamily = squares[i].getAttribute('data-family');
                    if (columnOfTwo.every(index => squares[index].getAttribute('data-family') === decidedFamily && decidedFamily)) {
                        columnOfTwo.forEach(index => matchedIndices.add(index));
                    }
                }

                if (matchedIndices.size > 0) {
                    isProcessing = true; 
                    matchedIndices.forEach(index => squares[index].classList.add('match-highlight'));

                    setTimeout(() => {
                        if (addPoints) {
                            score += matchedIndices.size * 10;
                            scoreDisplay.innerText = score;
                        }
                        matchedIndices.forEach(index => {
                            squares[index].classList.remove('match-highlight'); 
                            squares[index].classList.add('matched'); 
                        });

                        setTimeout(() => {
                            matchedIndices.forEach(index => {
                                squares[index].classList.remove('matched');
                                squares[index].removeAttribute('data-family'); 
                                squares[index].innerText = '';
                                squares[index].style.backgroundColor = 'transparent'; 
                                squares[index].style.boxShadow = 'none';
                            });
                            moveDown();
                        }, 400); 
                    }, 600); 
                    return true;
                } else {
                    isProcessing = false; 
                    if (gameActive && !findPossibleSwapMove()) createBoard();
                    return false;
                }
            }

            function setSquareVisuals(element, family, text, color) {
                element.setAttribute('data-family', family);
                element.innerText = text;
                element.style.backgroundColor = color;
                element.style.color = 'white';
                if(family) {
                    element.style.boxShadow = 'inset -3px -5px 10px rgba(0,0,0,0.25), inset 2px 3px 5px rgba(255,255,255,0.2)';
                } else {
                    element.style.boxShadow = 'none';
                }
            }

            function moveDown() {
                for (let i = 0; i < width; i++) {
                    let emptySlots = 0;
                    for (let j = width - 1; j >= 0; j--) {
                        let index = j * width + i;
                        if (!squares[index].getAttribute('data-family')) {
                            emptySlots++;
                        } else if (emptySlots > 0) {
                            let targetIndex = (j + emptySlots) * width + i;
                            const family = squares[index].getAttribute('data-family');
                            const text = squares[index].innerText;
                            const color = squares[index].style.backgroundColor;

                            setSquareVisuals(squares[targetIndex], family, text, color);
                            
                            squares[index].removeAttribute('data-family');
                            squares[index].style.backgroundColor = 'transparent';
                            squares[index].innerText = '';
                            squares[index].style.boxShadow = 'none';
                        }
                    }
                    
                    for (let j = 0; j < emptySlots; j++) {
                        let index = j * width + i;
                        const data = getRandomItem();
                        applyItemData(squares[index], data);
                    }
                }

                if (currentMode === 'swap') {
                    setTimeout(() => resolveMatches(true), 250);
                } else {
                    setTimeout(() => {
                        if (gameActive && !findPossibleClickMove()) createBoard();
                        isProcessing = false;
                    }, 250);
                }
            }

            window.showHint = function() {
                if (!gameActive || isProcessing) return;
                squares.forEach(sq => sq.classList.remove('hint-target'));

                score = Math.max(0, score - 10);
                scoreDisplay.innerText = score;
                scoreDisplay.style.color = '#e74c3c'; 
                setTimeout(() => scoreDisplay.style.color = '#2f3542', 500);

                let move = currentMode === 'swap' ? findPossibleSwapMove() : findPossibleClickMove();

                if (move) {
                    if(currentMode === 'swap'){
                        squares[move[0]].classList.add('hint-target');
                        squares[move[1]].classList.add('hint-target');
                    } else {
                        const family = squares[move[0]].getAttribute('data-family');
                        const cluster = getConnectedCluster(move[0], family);
                        cluster.forEach(index => squares[index].classList.add('hint-target'));
                    }

                    setTimeout(() => { squares.forEach(sq => sq.classList.remove('hint-target')); }, 2000);
                } else {
                    createBoard(); 
                }
            }

            window.startGame = function(selectedWidth) {
                width = selectedWidth || 8;
                document.documentElement.style.setProperty('--grid-width', width);

                // 隨機抽取 6 組全新題目
                let shuffled = [...allMultiplicationFamilies].sort(() => 0.5 - Math.random());
                activeFamilies = shuffled.slice(0, 6);

                currentMode = document.querySelector('input[name="playMode"]:checked').value;
                currentTheme = document.querySelector('input[name="colorTheme"]:checked').value;

                modal.style.display = 'none';
                score = 0;
                
                const selectedTime = parseInt(document.getElementById('time-select').value, 10);
                // 若選擇 0，則設定時間為無限大 (Infinity)
                timeLeft = selectedTime === 0 ? Infinity : (isNaN(selectedTime) ? 120 : selectedTime);

                scoreDisplay.innerText = score;
                timerDisplay.innerText = timeLeft === Infinity ? '∞' : timeLeft;
                gameActive = true;
                isProcessing = false;
                selectedSquareId = null;
                
                createBoard();

                if (timerId) clearInterval(timerId);
                
                // 只有在有限時間下才啟動倒數計時
                if (timeLeft !== Infinity) {
                    timerId = setInterval(() => {
                        timeLeft--;
                        timerDisplay.innerText = timeLeft;
                        if (timeLeft <= 0) endGame();
                    }, 1000);
                }
            }

            window.toggleZoom = function() {
                document.body.classList.toggle('zoom-mode');
                const zoomBtn = document.getElementById('zoom-btn');
                if (document.body.classList.contains('zoom-mode')) {
                    zoomBtn.innerText = '🔎 縮小';
                } else {
                    zoomBtn.innerText = '🔍 放大';
                }
            }

            window.restartGame = function() {
                if(!gameActive && timeLeft !== Infinity && timeLeft <= 0) return; // 避免在結算畫面誤觸
                startGame(width); // 沿用當前的寬度，重新抽題並重置遊戲
            }

            window.returnToMenu = function() {
                clearInterval(timerId);
                gameActive = false;
                modalTitle.innerText = "準備好了嗎？";
                modalScoreDisplay.innerText = "";
                modal.style.display = 'flex';
            }

            function endGame() {
                clearInterval(timerId);
                gameActive = false;
                modalTitle.innerText = "時間到！做得真棒！";
                modalScoreDisplay.innerText = `你的得分是：${score}`;
                modal.style.display = 'flex';
            }

        });
    </script>
</body>
</html>
